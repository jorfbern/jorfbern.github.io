<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movie Club Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #030712; color: #f3f4f6; min-height: 100vh;}
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
.header { text-align: center; margin-bottom: 20px; }
.header h1 {font-size: 2.2rem;
  background: linear-gradient(90deg,#818cf8,#a78bfa,#f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;}
.tabs { display: flex; gap: 4px; background: #111827; border: 1px solid #1f2937;
  border-radius: 10px; padding: 4px; margin-bottom: 24px;
  flex-wrap: wrap; justify-content: center;}
.tabs + .tabs { margin-top: -20px; }
.tab { padding: 9px 14px; border-radius: 8px; border: none;
  background: transparent; color: #9ca3af; cursor: pointer;
  font-size: .75rem; font-weight: 600; transition: all .2s;}
.tab:hover { color: #e5e7eb; background: #1f2937; }
.tab.active { background: #6366f1; color: white; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 12px; margin-bottom: 24px;}
@media(max-width:700px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
.kpi-row-4 { grid-template-columns: repeat(4, 1fr); }
.kpi {  background: #111827; border: 1px solid #1f2937;
  border-radius: 12px; padding: 16px 10px; text-align: center;}
.kpi .icon { font-size: 1.1rem; margin-bottom: 3px; }
.kpi .value { font-size: 1.5rem; font-weight: 700; color: white; }
.kpi .label {  font-size: .68rem; color: #9ca3af; margin-top: 2px;
  text-transform: uppercase; letter-spacing: .5px;}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media(max-width:768px) { .grid2 { grid-template-columns: 1fr; } }
.grid3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.card {  background: #111827; border: 1px solid #1f2937;
  border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;}
.card-header { padding: 16px 16px 4px; }
.card-header h3 { color: white; font-size: 1rem; margin-bottom: 2px; }
.card-header p { color: #6b7280; font-size: .75rem; }
.card-body { padding: 8px 16px 16px; flex: 1; display: flex; flex-direction: column; }
.card-body .chart-container { flex: 1; width: 100%; overflow-x: auto; }
.card-body .chart-container svg { display: block; width: 100%; height: 100%; }
.list-item {  display: flex; align-items: center; justify-content: space-between;
  background: #1f2937; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px;}
.list-item .rank {  font-weight: 700; width: 30px; text-align: center;
  margin-right: 8px; flex-shrink: 0; font-size: .9rem;}
.list-item .info { flex: 1; min-width: 0; }
.list-item .title-text {  color: white; font-size: .82rem; font-weight: 500;  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;}
.list-item .meta { color: #6b7280; font-size: .68rem; }
.badge {  display: inline-block; padding: 2px 9px; border-radius: 999px;  font-size: .73rem; font-weight: 600; color: white;}
.bg-indigo { background: #4f46e5; }
.bg-red { background: #dc2626; }
.bg-green { background: #059669; }
.bg-yellow { background: #d97706; }
.five-star-card {  background: linear-gradient(135deg, rgba(120,80,0,.2), #1f2937);  border: 1px solid rgba(202,138,4,.25); border-radius: 10px; padding: 10px;}
.five-star-card .ft { color: white; font-weight: 500; font-size: .84rem; }
.five-star-card .fy { color: #9ca3af; font-size: .7rem; }
.five-star-card .fb {  display: flex; justify-content: space-between; align-items: center; margin-top: 6px;}
.member-badge {  padding: 2px 8px; border-radius: 999px;
  font-size: .68rem; font-weight: 600; color: white;}
.ht-card { background: #1f2937; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
.ht-top { display: flex; justify-content: space-between; align-items: flex-start; }
.ht-bars { margin-top: 6px; }
.ht-bar { height: 7px; border-radius: 4px; margin-bottom: 3px; }
.ht-labels { display: flex; justify-content: space-between; font-size: .63rem; }
.footer {  text-align: center; color: #4b5563;  font-size: .7rem; margin-top: 32px; padding-bottom: 16px;}
.tab-content { display: none; }
.tab-content.active { display: block; }
.tooltip-box {  position: fixed; pointer-events: none; background: #111827;  border: 1px solid #374151; border-radius: 8px; padding: 8px 12px;  font-size: 12px; color: #e5e7eb; z-index: 9999; max-width: 280px;  box-shadow: 0 8px 24px rgba(0,0,0,.5); transition: opacity .1s; opacity: 0;}
.tooltip-box.show { opacity: 1; }
</style>
</head>

  var pad={t:12,r:16,b:xLabel?36:28,l:horiz?70:38};
  var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  var maxVal=yMax||Math.max.apply(_,data.map(function(d){return d[barKey]}))*1.15||1;
  var svg='<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">';

    var bw=Math.min(cw/data.length*.7,40),gap=(cw-bw*data.length)/data.length;
    data.forEach(function(d,i){var bh=Math.max(0,(d[barKey]/maxVal)*ch);var x=pad.l+i*(bw+gap)+gap/2;var yy2=pad.t+ch-bh;var c=colorFn?colorFn(d,i):color;svg+='<rect x="'+x+'" y="'+yy2+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+c+'" class="br" data-tip="'+(d._tip||d[labelKey]+': '+d[barKey])+'"><animate attributeName="height" from="0" to="'+bh+'" dur="0.4s"/><animate attributeName="y" from="'+(pad.t+ch)+'" to="'+yy2+'" dur="0.4s"/></rect>';svg+='<text x="'+(x+bw/2)+'" y="'+(h-pad.b+14)+'" text-anchor="middle" fill="#9ca3af" font-size="'+(data.length>10?8:10)+'">'+d[labelKey]+'</text>';});

  } else {
    var bh2=Math.min(ch/data.length*.7,28),gap2=(ch-bh2*data.length)/data.length;
    for(var j=0;j<=4;j++){var xx=pad.l+(cw/4)*j;svg+='<line x1="'+xx+'" y1="'+pad.t+'" x2="'+xx+'" y2="'+(h-pad.b)+'" stroke="#374151" stroke-dasharray="3,3"/><text x="'+xx+'" y="'+(h-pad.b+14)+'" text-anchor="middle" fill="#9ca3af" font-size="10">'+(maxVal/4*j).toFixed(maxVal>10?0:1)+'</text>';}

  }
  svg+='</svg>'; return svg;
}

function scatterPlot(data, opts) {
  var o=opts||{}, w=o.w||700, h=o.h||320;
  var xKey=o.xKey||'x', yKey=o.yKey||'y', xDom=o.xDomain, yDom=o.yDomain;
  var xLabel=o.xLabel||'', yLabel=o.yLabel||'', colorFn=o.colorFn||_;
  var pad={t:12,r:16,b:xLabel?38:26,l:yLabel?48:42};
  var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  var xMin=xDom[0],xMax=xDom[1],yMin=yDom[0],yMax=yDom[1];
  var sx=function(v){return(v-xMin)/(xMax-xMin)*cw+pad.l};
  var sy=function(v){return pad.t+ch-(v-yMin)/(yMax-yMin)*ch};
  var svg='<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">';
  for(var i=0;i<=4;i++){var xx=pad.l+(cw/4)*i,yy=pad.t+(ch/4)*i;svg+='<line x1="'+xx+'" y1="'+pad.t+'" x2="'+xx+'" y2="'+(pad.t+ch)+'" stroke="#374151" stroke-dasharray="2,3"/><line x1="'+pad.l+'" y1="'+yy+'" x2="'+(pad.l+cw)+'" y2="'+yy+'" stroke="#374151" stroke-dasharray="2,3"/><text x="'+xx+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" fill="#9ca3af" font-size="9">'+(xMin+(xMax-xMin)/4*i).toFixed(1)+'</text><text x="'+(pad.l-5)+'" y="'+(yy+3)+'" text-anchor="end" fill="#9ca3af" font-size="9">'+(yMax-(yMax-yMin)/4*i).toFixed(yMax>10?0:1)+'</text>';}
  data.forEach(function(d){var cx=sx(d[xKey]),cy=sy(d[yKey]);var c=colorFn?colorFn(d):'#818cf8';svg+='<circle cx="'+cx+'" cy="'+cy+'" r="4.5" fill="'+c+'" fill-opacity="0.65" class="br" data-tip="'+(d._tip||'')+'"/>';});
  if(xLabel) svg+='<text x="'+(pad.l+cw/2)+'" y="'+(h-2)+'" text-anchor="middle" fill="#6b7280" font-size="10">'+xLabel+'</text>';
  if(yLabel) svg+='<text x="13" y="'+(pad.t+ch/2)+'" text-anchor="middle" fill="#6b7280" font-size="10" transform="rotate(-90,13,'+(pad.t+ch/2)+')">'+yLabel+'</text>';
  svg+='</svg>'; return svg;
}

function areaLine(data, opts) {
  var o=opts||{}, w=o.w||900, h=o.h||260, valKey=o.valKey||'val', color=o.color||'#8b5cf6';
  var yMaxV=o.yMax!=_?o.yMax:5, yMinV=o.yMin!=_?o.yMin:0;
  var pad={t:12,r:12,b:30,l:38};
  var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  var sx=function(i){return pad.l+(i/(data.length-1))*cw};
  var sy=function(v){return pad.t+ch-((v-yMinV)/(yMaxV-yMinV))*ch};
  var pts=data.map(function(d,i){return sx(i)+','+sy(d[valKey])}).join(' ');
  var svg='<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">';
  for(var i=0;i<=5;i++){var yy=pad.t+(ch/5)*i;svg+='<line x1="'+pad.l+'" y1="'+yy+'" x2="'+(w-pad.r)+'" y2="'+yy+'" stroke="#374151" stroke-dasharray="3,3"/><text x="'+(pad.l-5)+'" y="'+(yy+3)+'" text-anchor="end" fill="#9ca3af" font-size="9">'+(yMaxV-(yMaxV-yMinV)/5*i).toFixed(1)+'</text>';}
  svg+='<polygon points="'+sx(0)+','+(pad.t+ch)+' '+pts+' '+sx(data.length-1)+','+(pad.t+ch)+'" fill="'+color+'" fill-opacity="0.12"/>';
  svg+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2"/>';
  data.forEach(function(d,i){if(d.dot!==undefined) svg+='<circle cx="'+sx(i)+'" cy="'+sy(d.dot)+'" r="2.5" fill="#f59e0b" class="br" data-tip="'+(d._tip||'')+'"/>';});
  svg+='<text x="'+(pad.l+cw/2)+'" y="'+(h-4)+'" text-anchor="middle" fill="#6b7280" font-size="10">Movie #</text></svg>';
  return svg;
}

    var subWithAvg=mySubmissions.map(function(m){
      var vals=N.map(function(nm){return gr(m,nm)}).filter(function(v){return v!=_});
      return{t:m.t,y:m.y,gAvg:vals.length?+(avg(vals)).toFixed(2):0,gCount:vals.length};
    }).filter(function(m){return m.gCount>=2});
    if(subWithAvg.length){
      var topSub=subWithAvg.slice().sort(function(a,b){return b.gAvg-a.gAvg})[0];
      var botSub=subWithAvg.slice().sort(function(a,b){return a.gAvg-b.gAvg})[0];
      h+='<div class="grid2">';
      h+='<div class="kpi"><div class="icon">🏆</div><div class="value" style="font-size:1.1rem">'+esc(topSub.t)+'</div><div class="label">Best Submission ('+topSub.gAvg+' ★ avg from '+topSub.gCount+' raters)</div></div>';
      h+='<div class="kpi"><div class="icon">😬</div><div class="value" style="font-size:1.1rem">'+esc(botSub.t)+'</div><div class="label">Worst Submission ('+botSub.gAvg+' ★ avg from '+botSub.gCount+' raters)</div></div>';
      h+='</div>';
    }
    
    // Rating dist
    var rDist=(function(){var d={};myRated.forEach(function(m){var k=gr(m,me);d[k]=(d[k]||0)+1;});return[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5].map(function(r){return{label:r.toString(),count:d[r]||0,_tip:r+' ★: '+(d[r]||0)};});})();

    // Whose picks
    var subStats=allSubs.map(function(nm){var th=M.filter(function(m){return m.s===nm});var tr=th.filter(function(m){return gr(m,me)!=_});return{name:nm,count:th.length,avgMy:tr.length?+(avg(tr.map(function(m){return gr(m,me)}))).toFixed(2):0};}).sort(function(a,b){return b.avgMy-a.avgMy});

    h+='<div class="grid2">';
    h+='<div class="card"><div class="card-header"><h3>'+me+'\'s Rating Distribution</h3><p>'+myRated.length+' movies rated</p></div><div class="card-body"><div class="chart-container" style="height:220px">';
    h+=barChart(rDist,{w:500,h:220,colorFn:function(d){var v=parseFloat(d.label);return v>=4?'#6366f1':v<=2?'#ef4444':'#818cf8';},xLabel:'Stars'});
    h+='</div></div></div>';
    h+='<div class="card"><div class="card-header"><h3>Whose Picks Does '+me+' Like Most?</h3></div><div class="card-body"><div class="chart-container" style="height:320px">';
    h+=barChart(subStats.map(function(s){return{label:s.name,count:s.avgMy,_tip:s.name+': '+s.avgMy+' ★'};}),{w:520,h:320,horizontal:true,yMax:5,colorFn:function(d){return MC[d.label]}});
    h+='</div></div></div>';
    h+='</div>';

    // Rolling
    var rolling=(function(){var win=10;return myRated.map(function(m,i){var sl=myRated.slice(Math.max(0,i-win+1),i+1);var r=+(avg(sl.map(function(x){return gr(x,me)}))).toFixed(2);return{pos:m.p,val:r,dot:gr(m,me),_tip:'#'+m.p+' '+m.t+'\n'+me+': '+gr(m,me)+' ★\nRolling: '+r};});})();
    if(rolling.length>1){
      h+='<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>'+me+'\'s Rating Journey</h3><p>10-movie rolling average</p></div><div class="card-body"><div class="chart-container" style="height:240px">';
      h+=areaLine(rolling,{w:1200,h:240,yMax:5,yMin:0});
      h+='</div></div></div>';
    }

    // Scatter
    var scYC=myRated.map(function(m){return{x:m.bl,y:gr(m,me),_tip:m.t+' ('+m.y+')\nPicked by: '+m.s+'\n'+me+': '+gr(m,me)+' ★\nIMDb/RT Blend: '+m.bl,s:m.s};});
    h+='<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>'+me+' vs. Critics</h3><p>Rating vs IMDb/RT Blend</p></div><div class="card-body"><div class="chart-container" style="height:320px">';
    h+=scatterPlot(scYC,{w:1200,h:320,xDomain:[30,100],yDomain:[0,5],xLabel:'IMDb/RT Blend',yLabel:me+"'s ★",colorFn:function(d){return MC[d.s]}});
    h+='</div></div></div>';

    // Hot takes
    var mapped=myRated.map(function(m){return{p:m.p,t:m.t,y:m.y,s:m.s,bl:m.bl,r:m.r,diff:gr(m,me)-(m.bl/20)};});
    var disap=mapped.slice().sort(function(a,b){return a.diff-b.diff}).slice(0,5);
    var gems=mapped.slice().sort(function(a,b){return b.diff-a.diff}).slice(0,5);
    function htCard(m){var rating=gr(M[m.p-1],me);return '<div class="ht-card"><div class="ht-top"><div><div style="color:#fff;font-weight:500;font-size:13px">'+esc(m.t)+'</div><div style="color:#6b7280;font-size:11px">'+m.y+' • '+m.s+'</div></div><div style="text-align:right"><div style="color:#facc15;font-weight:700">'+rating+' ★</div><div style="color:#9ca3af;font-size:11px">Blend: '+m.bl+'</div></div></div><div class="ht-bars"><div class="ht-bar" style="background:#eab308;width:'+(rating/5*100)+'%"></div><div class="ht-bar" style="background:#6366f1;opacity:.4;width:'+m.bl+'%"></div></div><div class="ht-labels"><span style="color:#eab308">'+me+'</span><span style="color:#818cf8">Critics</span></div></div>';}

    h+='<div class="grid2">';
    h+='<div class="card"><div class="card-header"><h3>👎 Biggest Disappointments</h3><p>Critics loved it, '+me+' didn\'t</p></div><div class="card-body">';
    disap.forEach(function(m){h+=htCard(m);});
    h+='</div></div>';
    h+='<div class="card"><div class="card-header"><h3>🔥 Hidden Gems</h3><p>'+me+' saw something critics missed</p></div><div class="card-body">';
    gems.forEach(function(m){h+=htCard(m);});
    h+='</div></div>';
    h+='</div>';

    // Perfect 5s
    h+='<div class="card"><div class="card-header"><h3>🏆 '+me+'\'s Perfect 5s</h3></div><div class="card-body"><div class="grid3">';
    if(fiveStars.length){fiveStars.forEach(function(m){h+='<div class="five-star-card"><div class="ft">'+esc(m.t)+'</div><div class="fy">'+m.y+'</div><div class="fb"><span class="member-badge" style="background:'+MC[m.s]+'">'+m.s+'</span><span style="color:#facc15;font-size:12px">Blend: '+m.bl+'</span></div></div>';});}
    else{h+='<p style="color:#6b7280">No 5-star ratings yet</p>';}
    h+='</div></div></div>';
    h+='</div>'; // end member tab
  });

  h+='<div class="footer">Built with ❤️ for Movie Club • '+totalM+' movies and counting</div>';
  document.getElementById('app').innerHTML=h;
  document.querySelectorAll('.br').forEach(function(el){el.addEventListener('mouseenter',function(e){var t=el.getAttribute('data-tip');if(t)showTip(e,t.split('\n').map(function(l){return'<div>'+esc(l)+'</div>'}).join(''));});el.addEventListener('mousemove',moveTip);el.addEventListener('mouseleave',hideTip);});
}

function setTab(t){curTab=t;render();}
window.setTab=setTab;
render();
</script>
</body>
</html>
